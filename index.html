    <script>
        let libraryCSV = "";
        let styleGuideCSV = "";

        // Your base Cloudflare link
        const CLOUDFLARE_WORKER_URL = 'https://steep-hat-cf4f.ipsita-hoichoi.workers.dev/';

        window.onload = async () => {
            try {
                // Fetch Library using the parameter
                const libRes = await fetch(CLOUDFLARE_WORKER_URL + '?type=library');
                libraryCSV = await libRes.text();
                
                // Fetch Style Guide using the parameter
                const styleRes = await fetch(CLOUDFLARE_WORKER_URL + '?type=style');
                styleGuideCSV = await styleRes.text();
                
                // Visual feedback that it's working
                if (libraryCSV.length > 100 && styleGuideCSV.length > 100) {
                    document.getElementById('statusDot').classList.replace('bg-red-500', 'live-indicator');
                    document.getElementById('statusDot').title = "All Systems Online";
                    appendMessage("System", "hoichoi Bot is Live. Library and Style Guide synced successfully.");
                }
            } catch (e) {
                appendMessage("System", "Connection Error: Check Cloudflare Worker settings.");
            }
        };
        
        // ... rest of the askBot logic remains the same
    </script>
